# yaml-language-server: $schema=https://raw.githubusercontent.com/ffimnsr/mk-rs/main/docs/schema.json

use_cargo: true

tasks:
  greet:
    commands:
      - echo "Hello, World!"
    description: Sample greet command
  install:
    commands:
      - cargo install --force --path crates/orodruin --all-features
    description: Install the orodruin-cli binary.
  format:
    commands:
      - cargo fmt --all
    description: Format the code using rustfmt.
  lint:
    commands:
      - cargo clippy --workspace --all-targets --all-features -- -D warnings
    description: Lint the code using clippy and treat warnings as errors.
