name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1
  CARGO_PROFILE_RELEASE_LTO: thin
  CARGO_PROFILE_RELEASE_PANIC: abort
  CARGO_PROFILE_RELEASE_STRIP: symbols
  RUSTFLAGS: --remap-path-prefix=${{ github.workspace }}=/workspace

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release inputs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: orodruin-rust-${{ runner.os }}
          cache-on-failure: "true"

      - name: Run quality gates
        env:
          RUSTDOCFLAGS: -D warnings
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          cargo doc --workspace --no-deps --locked
          cargo test --workspace --locked

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: orodruin-rust-${{ runner.os }}
          cache-on-failure: "true"

      - name: Install Linux musl tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Derive reproducible build timestamp
        shell: bash
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "${GITHUB_ENV}"

      - name: Build release binaries
        run: cargo build --locked --release -p orodruin-cli --target ${{ matrix.target }}

      - name: Prepare package metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(grep '^version = ' crates/orodruin/Cargo.toml | head -n1 | cut -d '"' -f2)"
          fi
          BASENAME="orodruin-${VERSION}-${{ matrix.target }}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "basename=${BASENAME}" >> "${GITHUB_OUTPUT}"

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          BASENAME="${{ steps.meta.outputs.basename }}"
          mkdir -p "${BASENAME}"
          cp "target/${{ matrix.target }}/release/orodruin" "${BASENAME}/"
          cp "target/${{ matrix.target }}/release/rui" "${BASENAME}/"
          cp Cargo.lock README.md LICENSE LICENSE-APACHE "${BASENAME}/"
          tar -czf "${BASENAME}.tar.gz" "${BASENAME}"
          shasum -a 256 "${BASENAME}.tar.gz" | awk -v name="${BASENAME}.tar.gz" '{print $1 "  " name}' > "${BASENAME}.tar.gz.sha256"

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ steps.meta.outputs.basename }}.${{ matrix.archive_ext }}
            ${{ steps.meta.outputs.basename }}.${{ matrix.archive_ext }}.sha256

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.tar.gz.sha256
          generate_release_notes: true
